# EmoCare sanctuary API — deploy from GitHub (one-click)
# Docs: https://docs.railway.com/guides/deployments
#
# Setup:
#   1. railway.app → New Project → Deploy from GitHub → select emocare-ai
#   2. This file is picked up automatically (railway.toml at repo root)
#   3. Variables → add keys from server/.env.example
#   4. Settings → Networking → Generate Domain → copy HTTPS URL
#   5. Client .env: EXPO_PUBLIC_EMOCARE_API_URL=https://your-app.up.railway.app

[build]
builder = "DOCKERFILE"
dockerfilePath = "server/Dockerfile"
dockerContext = "server"
watchPatterns = ["server/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
